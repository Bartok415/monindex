<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Index</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin:auto; }
    .box { border:1px solid #ccc; padding:12px; margin:10px 0; }
    #app { display:none; }
    button { margin-top:5px; }
  </style>
</head>
<body>

<h1>📦 Mon Index</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="box">
  <h2>Connexion</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Mot de passe"><br><br>
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<!-- 📦 APP -->
<div id="app">

  <button onclick="logout()">🚪 Déconnexion</button>

  <div class="box">
    <h2>➕ Ajouter index</h2>
    <input id="name" placeholder="Nom"><br><br>
    <input id="code" placeholder="Suite de chiffres"><br><br>
    <button onclick="addData()">Ajouter</button>
  </div>

  <div class="box">
    <h2>🔍 Recherche</h2>
    <input id="search" placeholder="Nom"><br><br>
    <button onclick="searchData()">Rechercher</button>
    <p id="result"></p>
  </div>

  <div class="box">
    <h2>📋 Mes index</h2>
    <button onclick="loadAll()">Afficher tout</button>
    <p id="list"></p>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  query, 
  where, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjof3pUtMA9FdipAhENV8kMO_5_BVA8wQ",
  authDomain: "mon-index-app.firebaseapp.com",
  projectId: "mon-index-app",
  storageBucket: "mon-index-app.firebasestorage.app",
  messagingSenderId: "936532214351",
  appId: "1:936532214351:web:8461a9be4cbb59c59fa03a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔄 UI SWITCH
const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("app");

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    appBox.style.display = "block";
  } else {
    loginBox.style.display = "block";
    appBox.style.display = "none";
  }
});

//
// 🔐 SIGNUP
//
window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Compte créé !");
  } catch (e) {
    alert(e.message);
  }
};

//
// 🔑 LOGIN
//
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Connecté !");
  } catch (e) {
    alert(e.message);
  }
};

//
// 🚪 LOGOUT
//
window.logout = async () => {
  await signOut(auth);
};

//
// ➕ ADD (PAR UTILISATEUR)
//
window.addData = async () => {
  try {
    const user = auth.currentUser;
    if (!user) return alert("Pas connecté");

    const nameValue = document.getElementById("name").value.trim();
    const codeValue = document.getElementById("code").value.trim();

    if (!nameValue || !codeValue) {
      alert("Remplis tous les champs !");
      return;
    }

    await addDoc(collection(db, "users", user.uid, "index"), {
      name: nameValue,
      code: codeValue
    });

    alert("Ajout réussi !");
  } catch (e) {
    alert(e.message);
  }
};

//
// 🔍 SEARCH
//
window.searchData = async () => {
  try {
    const user = auth.currentUser;
    const searchValue = document.getElementById("search").value.trim();

    const q = query(
      collection(db, "users", user.uid, "index"),
      where("name", "==", searchValue)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      document.getElementById("result").innerText = "Aucun résultat";
      return;
    }

    let text = "";
    snap.forEach(doc => {
      text += doc.data().code + "\n";
    });

    document.getElementById("result").innerText = text;

  } catch (e) {
    alert(e.message);
  }
};

//
// 📋 LOAD ALL
//
window.loadAll = async () => {
  try {
    const user = auth.currentUser;

    const q = query(collection(db, "users", user.uid, "index"));
    const snap = await getDocs(q);

    let text = "";

    snap.forEach(doc => {
      const d = doc.data();
      text += `${d.name} → ${d.code}\n`;
    });

    document.getElementById("list").innerText = text || "vide";
  } catch (e) {
    alert(e.message);
  }
};

</script>

</body>
</html>
