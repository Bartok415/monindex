<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Index</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin:auto; }
    .box { border:1px solid #ccc; padding:10px; margin:10px 0; }
  </style>
</head>
<body>

<h1>📦 Mon Index</h1>

<!-- LOGIN -->
<div class="box">
  <h2>🔐 Connexion</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Mot de passe"><br><br>
  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
</div>

<hr>

<!-- AJOUT -->
<div class="box">
  <h2>➕ Ajouter index</h2>
  <input id="name" placeholder="Nom"><br><br>
  <input id="code" placeholder="Suite de chiffres"><br><br>
  <button onclick="addData()">Ajouter</button>
</div>

<hr>

<p id="result"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjof3pUtMA9FdipAhENV8kMO_5_BVA8wQ",
  authDomain: "mon-index-app.firebaseapp.com",
  projectId: "mon-index-app",
  storageBucket: "mon-index-app.firebasestorage.app",
  messagingSenderId: "936532214351",
  appId: "1:936532214351:web:8461a9be4cbb59c59fa03a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 CREATE ACCOUNT
window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Compte créé !");
  } catch (e) {
    alert(e.message);
  }
};

// 🔑 LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Connecté !");
  } catch (e) {
    alert(e.message);
  }
};

// ➕ ADD DATA (FIX FINAL)
window.addData = async () => {
  try {
    const nameInput = document.getElementById("name");
    const codeInput = document.getElementById("code");

    const name = nameInput.value.trim();
    const code = codeInput.value.trim();

    if (!name || !code) {
      alert("Remplis tous les champs !");
      return;
    }

    await addDoc(collection(db, "test"), {
      name: name,
      code: code
    });

    alert("✅ Ajout réussi !");
  } catch (e) {
    alert("❌ Erreur : " + e.message);
    console.log(e);
  }
};

</script>

</body>
</html>
