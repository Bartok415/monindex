<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Index</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin:auto; }
    .box { border:1px solid #ccc; padding:12px; margin:10px 0; }
    #app { display:none; }
    .item { display:flex; align-items:center; gap:10px; margin:5px 0; }
  </style>
</head>
<body>

<h1>📦 Mon Index</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="box">
  <h2>Connexion</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Mot de passe"><br><br>

  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>

  <!-- 📅 DERNIÈRE MISE À JOUR (LOCAL JS) -->
  <p id="updateInfo"></p>
</div>

<!-- 📦 APP -->
<div id="app">

  <button onclick="logout()">🚪 Déconnexion</button>

  <div class="box">
    <h2>➕ Ajouter index</h2>
    <input id="name" placeholder="Nom"><br><br>
    <input id="code" placeholder="Suite de chiffres"><br><br>
    <button onclick="addData()">Ajouter</button>
  </div>

  <div class="box">
    <h2>🔍 Recherche</h2>
    <input id="search" placeholder="Nom"><br><br>
    <button onclick="searchData()">Rechercher</button>
    <p id="result"></p>
  </div>

  <div class="box">
    <h2>📋 Mes index</h2>
    <button onclick="loadAll()">Actualiser</button>
    <button onclick="deleteSelected()">🗑 Supprimer sélection</button>
    <div id="list"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  where,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjof3pUtMA9FdipAhENV8kMO_5_BVA8wQ",
  authDomain: "mon-index-app.firebaseapp.com",
  projectId: "mon-index-app",
  storageBucket: "mon-index-app.firebasestorage.app",
  messagingSenderId: "936532214351",
  appId: "1:936532214351:web:8461a9be4cbb59c59fa03a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

//
// 🔄 UI SWITCH
//
const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("app");

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    appBox.style.display = "block";
  } else {
    loginBox.style.display = "block";
    appBox.style.display = "none";
  }
});

//
// 📅 DERNIÈRE MISE À JOUR (SANS FIREBASE)
//
function showLastUpdate() {
  const now = new Date();

  const formatted =
    now.toLocaleDateString("fr-FR") +
    " à " +
    now.toLocaleTimeString("fr-FR");

  document.getElementById("updateInfo").innerText =
    "📅 Dernière mise à jour : " + formatted;
}

showLastUpdate();

//
// 🔐 SIGNUP
//
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
};

//
// 🔑 LOGIN
//
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

//
// 🚪 LOGOUT
//
window.logout = async () => {
  await signOut(auth);
};

//
// ➕ ADD
//
window.addData = async () => {
  const user = auth.currentUser;

  const nameValue = name.value.trim();
  const codeValue = code.value.trim();

  await addDoc(collection(db, "users", user.uid, "index"), {
    name: nameValue,
    code: codeValue
  });

  loadAll();
};

//
// 🔍 SEARCH
//
window.searchData = async () => {
  const user = auth.currentUser;
  const searchValue = search.value.trim();

  const q = query(
    collection(db, "users", user.uid, "index"),
    where("name", "==", searchValue)
  );

  const snap = await getDocs(q);

  let text = "";

  snap.forEach(d => {
    text += d.data().code + "\n";
  });

  result.innerText = text || "Aucun résultat";
};

//
// 📋 LOAD ALL
//
window.loadAll = async () => {
  const user = auth.currentUser;

  const q = query(collection(db, "users", user.uid, "index"));
  const snap = await getDocs(q);

  let html = "";

  snap.forEach(d => {
    const data = d.data();

    html += `
      <div class="item">
        <input type="checkbox" value="${d.id}">
        <span>${data.name} → ${data.code}</span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
};

//
// 🗑 DELETE WITH CONFIRMATION
//
window.deleteSelected = async () => {
  const user = auth.currentUser;

  const checkboxes = document.querySelectorAll("#list input[type='checkbox']:checked");

  if (checkboxes.length === 0) {
    alert("Aucun élément sélectionné");
    return;
  }

  const confirmText = prompt('Tape "confirmer" pour valider la suppression :');

  if (confirmText !== "confirmer") {
    alert("Suppression annulée");
    return;
  }

  for (let cb of checkboxes) {
    await deleteDoc(doc(db, "users", user.uid, "index", cb.value));
  }

  alert("Suppression effectuée !");
  loadAll();
};

</script>

</body>
</html>
