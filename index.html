<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Index</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin:auto; }
    .box { border:1px solid #ccc; padding:12px; margin:10px 0; }
    #app { display:none; }
    .item { display:flex; align-items:center; gap:10px; margin:5px 0; }
  </style>
</head>
<body>

<h1>📦 Mon Index</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="box">
  <h2>Connexion</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Mot de passe"><br><br>

  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>

  <!-- 📅 DERNIÈRE MODIFICATION HTML -->
  <p id="updateInfo"></p>
</div>

<!-- 📦 APP -->
<div id="app">

  <button onclick="logout()">🚪 Déconnexion</button>

  <div class="box">
    <h2>➕ Ajouter index</h2>
    <input id="name" placeholder="Nom"><br><br>
    <input id="code" placeholder="Suite de chiffres"><br><br>
    <button onclick="addData()">Ajouter</button>
  </div>

  <div class="box">
    <h2>🔍 Recherche intelligente</h2>
    <input id="search" placeholder="Tape un mot..."><br><br>
    <button onclick="searchData()">Rechercher</button>
    <p id="result"></p>
  </div>

  <div class="box">
    <h2>📋 Mes index</h2>

    <p id="counter">0 index enregistrés</p>

    <select id="sortMode" onchange="loadAll()">
      <option value="name">Trier par nom</option>
      <option value="newest">Dernier ajouté</option>
    </select>

    <br><br>

    <button onclick="loadAll()">Actualiser</button>
    <button onclick="deleteSelected()">🗑 Supprimer sélection</button>

    <div id="list"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  getDocs,
  deleteDoc,
  doc,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjof3pUtMA9FdipAhENV8kMO_5_BVA8wQ",
  authDomain: "mon-index-app.firebaseapp.com",
  projectId: "mon-index-app",
  storageBucket: "mon-index-app.firebasestorage.app",
  messagingSenderId: "936532214351",
  appId: "1:936532214351:web:8461a9be4cbb59c59fa03a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

//
// 📅 DERNIÈRE MODIFICATION HTML (IMPORTANT)
//
function showUpdate() {
  const last = document.lastModified;

  document.getElementById("updateInfo").innerText =
    "📅 Dernière modification du code : " + last;
}

showUpdate();

//
// 🔄 UI
//
const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("app");

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    appBox.style.display = "block";
    loadAll();
  } else {
    loginBox.style.display = "block";
    appBox.style.display = "none";
  }
});

//
// 🔐 SIGNUP
//
window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

//
// 🔑 LOGIN
//
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

//
// 🚪 LOGOUT
//
window.logout = async () => {
  await signOut(auth);
};

//
// ➕ ADD (ANTI-DOUBLON)
//
window.addData = async () => {
  try {
    const user = auth.currentUser;

    const nameValue = document.getElementById("name").value.trim();
    const codeValue = document.getElementById("code").value.trim();

    if (!nameValue || !codeValue) {
      alert("Champs vides");
      return;
    }

    const q = query(collection(db, "users", user.uid, "index"));
    const snap = await getDocs(q);

    let exists = false;

    snap.forEach(d => {
      if (d.data().code === codeValue) exists = true;
    });

    if (exists) {
      alert("❌ Ce code existe déjà !");
      return;
    }

    await addDoc(collection(db, "users", user.uid, "index"), {
      name: nameValue,
      code: codeValue,
      createdAt: Date.now()
    });

    loadAll();

  } catch (e) {
    alert(e.message);
  }
};

//
// 🔍 SEARCH INTELLIGENT
//
window.searchData = async () => {
  const user = auth.currentUser;

  const searchValue = document.getElementById("search").value
    .trim()
    .toLowerCase();

  const q = query(collection(db, "users", user.uid, "index"));
  const snap = await getDocs(q);

  let results = [];

  snap.forEach(d => {
    const data = d.data();

    const name = (data.name || "").toLowerCase();
    const code = (data.code || "").toLowerCase();

    if (name.includes(searchValue) || code.includes(searchValue)) {
      results.push(data.code);
    }
  });

  document.getElementById("result").innerText =
    results.length ? results.join("\n") : "Aucun résultat";
};

//
// 📋 LOAD + TRI + COMPTEUR
//
window.loadAll = async () => {
  const user = auth.currentUser;
  const mode = document.getElementById("sortMode").value;

  let q;

  if (mode === "name") {
    q = query(
      collection(db, "users", user.uid, "index"),
      orderBy("name")
    );
  } else {
    q = query(
      collection(db, "users", user.uid, "index"),
      orderBy("createdAt", "desc")
    );
  }

  const snap = await getDocs(q);

  let html = "";
  let count = 0;

  snap.forEach(d => {
    const data = d.data();
    count++;

    html += `
      <div class="item">
        <input type="checkbox" value="${d.id}">
        <span>${data.name} → ${data.code}</span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;

  document.getElementById("counter").innerText =
    count + " index enregistrés";
};

//
// 🗑 DELETE
//
window.deleteSelected = async () => {
  const user = auth.currentUser;

  const checkboxes = document.querySelectorAll("#list input:checked");

  if (checkboxes.length === 0) {
    alert("Aucun élément sélectionné");
    return;
  }

  const confirmText = prompt('Tape "confirmer" pour supprimer');

  if (confirmText !== "confirmer") {
    alert("Annulé");
    return;
  }

  for (let cb of checkboxes) {
    await deleteDoc(doc(db, "users", user.uid, "index", cb.value));
  }

  loadAll();
};

</script>

</body>
</html>
